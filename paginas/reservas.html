<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/reservas.css">
    <title>Reservar Cita</title>
</head>
<body>

    <div id="resContenido">

        <div id="resTitulo">
            <img src="../img/logo.png" alt="Logo">
            <h2>Reserva tu cita</h2>
            <p>Completa el formulario y nos pondremos en contacto contigo</p>
        </div>

        <div id="resForm">

            <div class="resGrupo">
                <label>DNI</label>
                <input type="number" id="dni" placeholder="Ingresa tu DNI">
                <p class="error" id="errorDni"></p>
            </div>

            <div class="resGrupo">
                <label>Nombres</label>
                <input type="text" id="nombres" placeholder="Ingresa tus nombres">
                <p class="error" id="errorNombres"></p>
            </div>

            <div class="resGrupo">
                <label>Apellidos</label>
                <input type="text" id="apellidos" placeholder="Ingresa tus apellidos">
                <p class="error" id="errorApellidos"></p>
            </div>

            <div class="resGrupo">
                <label>Nro. Celular</label>
                <input type="number" id="telefono" placeholder="Ingresa tu celular">
                <p class="error" id="errorCelular"></p>
            </div>

            <div class="resGrupo">
                <label>Barbero</label>
                <select id="barbero">
                    <option value="">-- Selecciona un barbero --</option>
                </select>
                <p class="error" id="errorBarbero"></p>
            </div>

            <div class="resGrupo">
                <label>Horario</label>
                <select id="horario">
                    <option value="">-- Selecciona un horario --</option>
                </select>
                <p class="error" id="errorHorario"></p>
            </div>

            <div class="resGrupo">
                <label>Fecha de reserva</label>
                <input type="date" id="fecha">
                <p class="error" id="errorFecha"></p>
            </div>

            <button id="btnConfirmar">Confirmar Reserva</button>

        </div>

        <a href="home.html" id="volver">Volver</a>

    </div>
    
    <script src="../js/reservas.js"></script>

</body>
</html>
